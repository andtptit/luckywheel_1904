<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lễ Trao Giải Học Bổng</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body class="award-body">
    <nav style="padding: 1rem 2rem;">
        <a href="./index.html" style="color: white; text-decoration: none; font-weight: bold;">← Về Trang Chủ</a>
    </nav>
    <div class="container">
        <!-- Control Section -->
        <div class="glass-panel">
            <h1 class="main-title" style="font-size: 2.5rem;">Lễ Trao Giải Học Bổng</h1>
            
            <div class="form-group" style="margin-bottom: 1rem;">
                <label>Nhập danh sách ứng viên (Mỗi người 1 dòng)</label>
                <textarea id="candidateInput" class="form-control" rows="4" placeholder="Nguyễn Văn A&#10;Trần Thị B..."></textarea>
                <button id="btnLoadCandidates" class="btn btn-secondary" style="flex-direction: row; margin-top: 0.5rem; padding: 0.5rem 1rem;">Tải Danh Sách</button>
            </div>

            <div class="form-group">
                <label>Chọn Loại Giải Thưởng Để Quay:</label>
                <div class="prize-selector" id="prizeSelector">
                    <!-- Options re-rendered by JS -->
                </div>
            </div>

            <button id="spinAwardBtn" class="btn btn-primary" style="width: 100%; flex-direction: row; font-size: 1.2rem; padding: 1rem;" disabled>
                QUAY CHỌN NGƯỜI TRÚNG GIẢI 🎯
            </button>

            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Danh sách hiện tại (<span id="candidateCount">0</span> người)</label>
                <div class="candidate-list" id="candidateList">
                    <!-- Candidates -->
                </div>
            </div>
        </div>

        <!-- Wheel Section -->
        <div class="wheel-wrapper">
            <div class="wheel-pointer" style="background: var(--gold);"></div>
            <div class="wheel-container" style="border-color: #fff;">
                <canvas id="awardWheel" class="wheel-canvas" width="500" height="500"></canvas>
                <div class="wheel-center-dot" style="background: var(--bg-dark); border-color: var(--gold);"></div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-content" style="border-color: #fff;">
            <h2 class="modal-title" style="color: #fff; text-shadow: 0 0 20px var(--gold);">SÉC TRÚNG THƯỞNG 🏆</h2>
            <p style="color: #cbd5e1; margin-bottom: 0.5rem;">Người may mắn nhất là:</p>
            <h3 style="font-size: 2rem; color: var(--gold); margin-bottom: 1rem; font-family: var(--font-heading);" id="winnerName"></h3>
            <p class="modal-prize" id="prizeText"></p>
            <button class="btn btn-secondary" onclick="document.getElementById('resultModal').classList.remove('active')" style="flex-direction: row;">Xác Nhận & Xóa Tên</button>
        </div>
    </div>

    <script type="module" src="/js/award.js"></script>
</body>
</html>
