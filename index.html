<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Vòng Quay May Mắn</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  </head>
  <body class="home-body">
    <div class="home-container">
        <div class="glass-panel text-center">
            <h1 class="main-title">Hệ Thống Vòng Quay Sự Kiện</h1>
            <p class="subtitle" id="subtitle-text" style="display: none;">Vui lòng chọn chế độ vòng quay</p>
            
            <!-- Phần nhập mật khẩu -->
            <div id="login-section" style="margin-top: 2rem;">
                <input type="password" id="adminPass" class="form-control" placeholder="Nhập mật khẩu hệ thống" style="max-width: 300px; display: inline-block; margin-bottom: 1rem; text-align: center;">
                <br>
                <button id="btnAuth" class="btn btn-secondary">Đăng nhập</button>
                <div id="authError" style="color: #ff5252; margin-top: 0.5rem; display: none; font-weight: bold;">❌ Sai mật khẩu!</div>
            </div>

            <!-- Các nút hành động (bị ẩn mặc định) -->
            <div class="action-buttons" id="system-actions" style="display: none;">
                <a href="./checkin.html" class="btn btn-primary btn-lg">
                    <span class="btn-icon">🎡</span>
                    Vòng Quay Check-in
                    <small>Dành cho khách tham gia sự kiện</small>
                </a>
                
                <a href="./award.html" class="btn btn-secondary btn-lg">
                    <span class="btn-icon">🏆</span>
                    Vòng Quay Trao Giải
                    <small>Dành cho ứng viên xét học bổng</small>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginSection = document.getElementById('login-section');
            const systemActions = document.getElementById('system-actions');
            const subtitleText = document.getElementById('subtitle-text');
            const adminPass = document.getElementById('adminPass');
            const btnAuth = document.getElementById('btnAuth');
            const authError = document.getElementById('authError');

            // Kiểm tra session để không bắt nhập lại nếu lỡ reload trang
            if (sessionStorage.getItem('tbt_auth') === 'true') {
                loginSection.style.display = 'none';
                systemActions.style.display = 'flex';
                subtitleText.style.display = 'block';
            }

            btnAuth.addEventListener('click', () => {
                if (adminPass.value === 'TBT@2026') {
                    sessionStorage.setItem('tbt_auth', 'true');
                    loginSection.style.display = 'none';
                    systemActions.style.display = 'flex';
                    subtitleText.style.display = 'block';
                    authError.style.display = 'none';
                } else {
                    authError.style.display = 'block';
                    adminPass.value = ''; // xóa pass sai
                }
            });

            // Hỗ trợ ấn Enter để đăng nhập
            adminPass.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') btnAuth.click();
            });
        });
    </script>
  </body>
</html>
